<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Modular Movement Controller banner</title>
  <desc id="desc">A dark portfolio banner for a Unity modular movement controller project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101114"/>
      <stop offset="0.55" stop-color="#1A2028"/>
      <stop offset="1" stop-color="#241319"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="100" x2="1120" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#40C9A2"/>
      <stop offset="0.48" stop-color="#F2C14E"/>
      <stop offset="1" stop-color="#E84855"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <path d="M76 338 C220 168, 385 370, 548 205 C705 47, 846 269, 1014 115 C1088 47, 1160 39, 1222 86" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M76 338 C220 168, 385 370, 548 205 C705 47, 846 269, 1014 115 C1088 47, 1160 39, 1222 86" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" opacity="0.2" filter="url(#softGlow)"/>

  <g opacity="0.16" stroke="#FFFFFF">
    <path d="M0 340 H1280"/>
    <path d="M0 280 H1280"/>
    <path d="M0 220 H1280"/>
    <path d="M0 160 H1280"/>
    <path d="M140 0 V420"/>
    <path d="M320 0 V420"/>
    <path d="M500 0 V420"/>
    <path d="M680 0 V420"/>
    <path d="M860 0 V420"/>
    <path d="M1040 0 V420"/>
    <path d="M1220 0 V420"/>
  </g>

  <g transform="translate(92 86)">
    <rect x="0" y="0" width="76" height="76" rx="18" fill="#151B22" stroke="#40C9A2" stroke-width="3"/>
    <path d="M23 50 L38 22 L53 50" stroke="#F2C14E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 55 H54" stroke="#E84855" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="92" y="210" fill="#F8F4EA" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="0">
    Modular Movement Controller
  </text>
  <text x="96" y="258" fill="#C8D0DA" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0">
    Responsive traversal, stamina rules, clean states, and portfolio-ready Unity code.
  </text>

  <g transform="translate(96 304)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="0" y="0" width="128" height="38" rx="10" fill="#162128" stroke="#40C9A2"/>
    <text x="20" y="25" fill="#F8F4EA">Unity</text>
    <rect x="148" y="0" width="124" height="38" rx="10" fill="#211E17" stroke="#F2C14E"/>
    <text x="168" y="25" fill="#F8F4EA">C#</text>
    <rect x="292" y="0" width="178" height="38" rx="10" fill="#24191C" stroke="#E84855"/>
    <text x="312" y="25" fill="#F8F4EA">State Machine</text>
    <rect x="490" y="0" width="180" height="38" rx="10" fill="#171B24" stroke="#8AB4F8"/>
    <text x="510" y="25" fill="#F8F4EA">Portfolio Demo</text>
  </g>
</svg>
