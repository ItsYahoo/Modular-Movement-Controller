<svg width="1180" height="540" viewBox="0 0 1180 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Stamina action gate diagram</title>
  <desc id="desc">A flow diagram showing how stamina-consuming actions are allowed, blocked, started, and regenerated.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#D8DEE9"/>
    </marker>
    <style>
      .title { font-family: Segoe UI, Inter, Arial, sans-serif; fill: #F8F4EA; font-size: 34px; font-weight: 800; }
      .sub { font-family: Segoe UI, Inter, Arial, sans-serif; fill: #AAB6C6; font-size: 16px; }
      .text { font-family: Segoe UI, Inter, Arial, sans-serif; fill: #F7FAFC; font-size: 17px; font-weight: 700; }
      .small { font-family: Segoe UI, Inter, Arial, sans-serif; fill: #CBD5E1; font-size: 13px; font-weight: 600; }
      .start { fill: #17212B; stroke: #5AD8CC; stroke-width: 2.5; }
      .good { fill: #182319; stroke: #64D47A; stroke-width: 2.5; }
      .warn { fill: #211F19; stroke: #F2C14E; stroke-width: 2.5; }
      .bad { fill: #251A1D; stroke: #E84855; stroke-width: 2.5; }
      .info { fill: #171B24; stroke: #8AB4F8; stroke-width: 2.5; }
      .line { stroke: #D8DEE9; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #7D8CA3; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 7; }
    </style>
  </defs>
  <rect width="1180" height="540" rx="24" fill="#0B0F14"/>
  <text x="40" y="58" class="title">Stamina Action Gate</text>
  <text x="42" y="88" class="sub">A small decision pipeline for sprint, dash, wall jump, climb, and future combat actions.</text>

  <rect x="56" y="228" width="168" height="68" rx="18" class="start"/>
  <text x="88" y="268" class="text">Action Request</text>

  <path d="M224 262 H300" class="line"/>
  <path d="M300 262 L382 190 L464 262 L382 334 Z" class="warn"/>
  <text x="331" y="257" class="text">State Allows</text>
  <text x="358" y="279" class="text">Action?</text>

  <path d="M464 262 H548" class="line"/>
  <path d="M548 262 L630 190 L712 262 L630 334 Z" class="warn"/>
  <text x="582" y="257" class="text">Enough</text>
  <text x="574" y="279" class="text">Stamina?</text>

  <path d="M712 262 H796" class="line"/>
  <path d="M796 262 L878 190 L960 262 L878 334 Z" class="warn"/>
  <text x="836" y="257" class="text">Cooldown</text>
  <text x="852" y="279" class="text">Ready?</text>

  <rect x="1000" y="228" width="138" height="68" rx="18" class="good"/>
  <text x="1028" y="256" class="text">Start</text>
  <text x="1022" y="279" class="text">Action State</text>
  <path d="M960 262 H1000" class="line"/>

  <rect x="548" y="410" width="164" height="68" rx="18" class="bad"/>
  <text x="582" y="449" class="text">Block Action</text>

  <rect x="796" y="410" width="164" height="68" rx="18" class="info"/>
  <text x="831" y="438" class="text">Feedback</text>
  <text x="824" y="461" class="small">UI, SFX, debug</text>

  <rect x="1000" y="110" width="138" height="68" rx="18" class="info"/>
  <text x="1027" y="139" class="text">Spend or</text>
  <text x="1024" y="162" class="text">Drain Cost</text>
  <path d="M1069 228 V178" class="line"/>

  <rect x="796" y="110" width="164" height="68" rx="18" class="info"/>
  <text x="824" y="139" class="text">Regen Delay</text>
  <text x="835" y="162" class="small">after spending</text>
  <path d="M1000 144 H960" class="line"/>

  <rect x="548" y="110" width="164" height="68" rx="18" class="good"/>
  <text x="581" y="139" class="text">Regenerate</text>
  <text x="590" y="162" class="small">until full</text>
  <path d="M796 144 H712" class="line"/>
  <path d="M630 178 V190" class="soft"/>

  <path d="M382 334 C410 408 485 444 548 444" class="soft"/>
  <text x="420" y="398" class="small">No</text>
  <path d="M630 334 V410" class="soft"/>
  <text x="644" y="382" class="small">No</text>
  <path d="M878 334 V410" class="soft"/>
  <text x="892" y="382" class="small">No</text>
  <path d="M712 444 H796" class="line"/>
  <path d="M1000 296 C965 374 934 401 906 410" class="soft"/>
</svg>
